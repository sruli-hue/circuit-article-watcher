name: article watcher

on:
  # PRIMARY trigger: an external pinger (cron-job.org) calls this every few min
  # via the workflow_dispatch API — that's what gives reliable cadence.
  workflow_dispatch:
  # FALLBACK only: GitHub's own schedule is laggy/best-effort, but if the pinger
  # ever stops this keeps the watcher alive rather than going silent.
  # Concurrency + the state file prevent any double-posting.
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python poll.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watcher_state.json
          # --cached so this also catches a brand-new (previously untracked) file.
          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "Update watcher state [skip ci]"
            git push
          fi
